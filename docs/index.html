    <title>@revivejs/loading</title>
    <script>
      (() => {
        try {
          const stored = window.localStorage.getItem('revivejs-loading-docs-theme');
          document.documentElement.dataset.docsTheme = stored === 'dark' ? 'dark' : 'light';
        } catch {
          document.documentElement.dataset.docsTheme = 'light';
        }
      })();
    </script>
